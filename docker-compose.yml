services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: attendance-dashboard:latest
    container_name: attendance-dashboard
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
